name: Flutter Coverage & Pages

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "**.md"
      - ".github/badges/**" # Prevents infinite loop when committing the badge
  release:
    types: [ published ]

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants write access to commit the badge
      pages: write    # Grants permission to prepare GitHub Pages
      id-token: write # Required for GitHub Pages
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Generate coverage report
        run: |
          sudo apt-get update
          sudo apt-get install -y lcov
          genhtml -o coverage coverage/lcov.info

      - name: Generate Coverage Badge
        run: |
          COVERAGE_PERCENT=$(lcov --summary coverage/lcov.info | grep -Po '\d+\.\d+%' | head -1 | tr -d '%')
          mkdir -p .github/badges
          curl -o .github/badges/coverage-badge.svg "https://img.shields.io/badge/Coverage-${COVERAGE_PERCENT}%25-brightgreen.svg"

      - name: Commit Coverage Badge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage-badge.svg
          # [skip ci] prevents this automated commit from triggering another workflow run
          git commit -m "chore: update coverage badge [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Upload Coverage Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./coverage

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: test-and-coverage
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5